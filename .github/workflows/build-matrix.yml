name: SWEF Build Matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64   # Windows PC (primary)
          - StandaloneOSX         # macOS (primary)
          - iOS                   # iPhone / iPadOS (primary)
          - Android               # Android phone / tablet (primary)

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # ── Cache Library ─────────────────────────────────────────────────────────
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build — ${{ matrix.targetPlatform }}
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:      ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:        ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD:     ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion:       6000.3.11f1
          targetPlatform:     ${{ matrix.targetPlatform }}
          buildMethod:        SWEF.BuildPipeline.CIBuildRunner.BuildAll
          allowDirtyBuild:    false
          versioning:         Semantic

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SWEF-${{ matrix.targetPlatform }}-${{ github.run_number }}
          path: build/${{ matrix.targetPlatform }}
          retention-days: 14

      # ── Build status summary ──────────────────────────────────────────────────
      - name: Report build status
        if: always()
        run: |
          echo "## Build Status: ${{ matrix.targetPlatform }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ **${{ matrix.targetPlatform }}** build succeeded." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **${{ matrix.targetPlatform }}** build failed." >> $GITHUB_STEP_SUMMARY
          fi
