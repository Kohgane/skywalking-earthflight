name: Acquire Unity License (.alf)
on:
  workflow_dispatch: {}   # 수동으로만 실행

jobs:
  request-alf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-request-activation-file@v2
        id: getAlf
        with:
          unityVersion: 6000.3.11f1   # ← 본인 Unity 버전으로 변경!

      - uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: ${{ steps.getAlf.outputs.filePath }}
