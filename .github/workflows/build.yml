##############################################################################
# SWEF Build Pipeline
#
# REQUIREMENTS:
# 1. A Windows self-hosted runner with Unity 2022.3 LTS already installed and activated
#    - Register at: Settings > Actions > Runners > New self-hosted runner
#    - Unity must be activated with a valid license on this machine
# 2. For iOS builds, a macOS self-hosted runner is additionally required
# 3. Required GitHub Secrets:
#    - ANDROID_KEYSTORE_NAME, ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASS
#    - ANDROID_KEYALIAS_NAME, ANDROID_KEYALIAS_PASS
#    - IOS_SIGNING_IDENTITY, IOS_PROVISIONING_PROFILE, IOS_TEAM_ID (for iOS)
#    - APPSTORE_API_KEY, APPSTORE_API_ISSUER (for TestFlight deployment)
##############################################################################

name: SWEF Build Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Default to read-only; individual jobs escalate only as needed.
permissions:
  contents: read

env:
  UNITY_VERSION: 2022.3.20f1
  # Must match BuildConfig.bundleId in Assets/SWEF/Config/SWEFBuildConfig.asset
  BUNDLE_ID: com.kohgane.swef.earthflight

jobs:
  validate:
    name: Validate Project
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-StandaloneWindows64-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-StandaloneWindows64-
            Library-

      - uses: game-ci/unity-builder@v4
        with:
          targetPlatform: StandaloneWindows64
          buildMethod: SWEF.Editor.BuildValidator.ValidateFromCLI
          unityVersion: ${{ env.UNITY_VERSION }}

  build-android:
    name: Build Android (AAB)
    needs: validate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      - uses: game-ci/unity-builder@v4
        with:
          targetPlatform: Android
          buildMethod: SWEF.Build.BuildPipeline.BuildAndroidCLI
          unityVersion: ${{ env.UNITY_VERSION }}
          androidAppBundle: true
          androidKeystoreName: ${{ secrets.ANDROID_KEYSTORE_NAME }}
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}
      - uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: Builds/Android/**/*.aab
          retention-days: 14

  # NOTE: iOS builds require a macOS self-hosted runner to be set up separately.
  # This job will not run until a macOS runner with Unity installed and activated
  # is registered under: Settings > Actions > Runners
  build-ios:
    name: Build iOS (Xcode Project)
    needs: validate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, macOS]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-iOS-
            Library-

      - uses: game-ci/unity-builder@v4
        with:
          targetPlatform: iOS
          buildMethod: SWEF.Build.BuildPipeline.BuildiOSCLI
          unityVersion: ${{ env.UNITY_VERSION }}
      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: Builds/iOS/
          retention-days: 14

  deploy-testflight:
    name: Deploy to TestFlight
    needs: build-ios
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    permissions: {}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ios-build
          path: Builds/iOS/
      - name: Build Xcode Archive
        run: |
          xcodebuild -project Builds/iOS/Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -archivePath Builds/iOS/SWEF.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="${{ secrets.IOS_SIGNING_IDENTITY }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE }}" \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}"
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath Builds/iOS/SWEF.xcarchive \
            -exportPath Builds/iOS/Export \
            -exportOptionsPlist Assets/SWEF/Scripts/Build/ExportOptions.plist
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: Builds/iOS/Export/skywalking-earthflight.ipa
          issuer-id: ${{ secrets.APPLE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPLE_API_PRIVATE_KEY }}

  deploy-play-console:
    name: Deploy to Play Console (Internal)
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-build
          path: Builds/Android/
      - uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: ${{ env.BUNDLE_ID }}
          releaseFiles: Builds/Android/**/*.aab
          track: internal
          status: draft
